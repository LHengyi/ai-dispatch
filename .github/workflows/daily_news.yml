name: AI Dispatch Weekly

on:
  schedule:
    - cron: '7 0 * * 1'   # 固定每周一 UTC 00:07 触发一次（北京时间周一 08:07）
  workflow_dispatch:      # 允许手动触发测试（忽略重复发送检查，直接发送）

permissions:
  contents: write           # 允许 Action 把 sent_history.json commit 回仓库

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Check weekly send state
        id: timecheck
        run: |
          CURRENT_DATE=$(date -u +%Y-%m-%d)
          LAST_SENT=$(python3 -c "import json; d=json.load(open('sent_history.json')); print(d.get('last_sent_date',''))" 2>/dev/null || echo "")

          echo "Last sent: $LAST_SENT | Today: $CURRENT_DATE"

          if [ "$LAST_SENT" = "$CURRENT_DATE" ]; then
            echo "Already sent today, skipping scheduled run."
            echo "should_send=false" >> $GITHUB_OUTPUT
          else
            echo "Not yet sent today — will send."
            echo "should_send=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.timecheck.outputs.should_send == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.timecheck.outputs.should_send == 'true' || github.event_name == 'workflow_dispatch'
        run: pip install -r requirements.txt

      - name: Fetch and send AI news
        if: steps.timecheck.outputs.should_send == 'true' || github.event_name == 'workflow_dispatch'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
        run: python fetch_news.py

      - name: Commit updated sent history
        if: steps.timecheck.outputs.should_send == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sent_history.json
          git diff --staged --quiet || git commit -m "chore: update sent history [skip ci]"
          git push
